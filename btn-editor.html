<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按钮编辑器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; color: #eee; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; }

/* 左侧工具栏 */
.panel {
  width: 300px; min-width: 300px; background: #1a1a1a; border-right: 1px solid #333;
  display: flex; flex-direction: column; overflow-y: auto; padding: 12px; gap: 10px;
  z-index: 100;
}
.panel h3 { font-size: 14px; color: #f90; margin: 0 0 4px; }
.panel label { font-size: 11px; color: #aaa; display: block; margin-top: 6px; }
.panel input, .panel select { width: 100%; padding: 6px 8px; background: #222; border: 1px solid #444; color: #fff; border-radius: 4px; font-size: 12px; }
.panel input[type="color"] { height: 32px; padding: 2px; cursor: pointer; }
.panel input[type="range"] { padding: 0; cursor: pointer; }
.panel button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
.btn-row { display: flex; gap: 6px; }
.btn-add { background: #27ae60; color: #fff; flex: 1; }
.btn-del { background: #c0392b; color: #fff; }
.btn-save { background: #2980b9; color: #fff; flex: 1; }
.btn-load { background: #555; color: #fff; flex: 1; }
.btn-list { font-size: 10px; color: #aaa; margin-top: 4px; }

/* 右侧画布 */
.canvas-wrap { flex: 1; position: relative; overflow: auto; background: #000; display: flex; align-items: center; justify-content: center; }
.canvas-inner { position: relative; width: 100%; max-width: 480px; aspect-ratio: 1280 / 2203; margin: auto; }

/* 可编辑按钮 */
.edit-btn {
  position: absolute; cursor: move; z-index: 10; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; transition: box-shadow 0.2s; user-select: none; -webkit-user-select: none;
  text-align: center; line-height: 1.2; word-break: break-all;
}
.edit-btn.active { outline: 2px dashed #4af; z-index: 20; }

/* 控制手柄 */
.resize-handle {
  position: absolute; width: 10px; height: 10px; background: #4af; border: 1px solid #fff;
  border-radius: 2px; z-index: 21;
}
.rh-se { bottom: -5px; right: -5px; cursor: nwse-resize; }
.rh-nw { top: -5px; left: -5px; cursor: nwse-resize; }
.rh-ne { top: -5px; right: -5px; cursor: nesw-resize; }
.rh-sw { bottom: -5px; left: -5px; cursor: nesw-resize; }

/* 状态栏 */
.status { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 1px solid #333; padding: 6px 12px; font-size: 11px; color: #888; z-index: 200; display: flex; gap: 16px; }
.status span { color: #f90; }
</style>
</head>
<body>

<div class="panel" id="panel">
  <h3>🎨 按钮编辑器</h3>
  <div class="btn-row">
    <button class="btn-add" onclick="addBtn()">＋ 新增</button>
    <button class="btn-del" onclick="delBtn()">✕ 删除</button>
  </div>
  <div class="btn-row">
    <button class="btn-save" onclick="save()">💾 保存</button>
    <button class="btn-load" onclick="load()">↺ 加载</button>
  </div>
  <div class="btn-list" id="btn-count">按钮数量: 0</div>

  <div id="props" style="display:none;">
    <h3>📐 属性</h3>
    <label>名称</label><input type="text" id="prop-name" onchange="updateProp('name')">
    <label>形状</label><select id="prop-shape" onchange="updateProp('shape')"><option value="circle">圆形</option><option value="rounded">圆角矩形</option><option value="square">方形</option><option value="oval">椭圆</option></select>
    <label>X (%)</label><input type="range" id="prop-x" min="0" max="100" step="0.1" oninput="updateProp('x')">
    <label>Y (%)</label><input type="range" id="prop-y" min="0" max="100" step="0.1" oninput="updateProp('y')">
    <label>宽度 (%)</label><input type="range" id="prop-w" min="1" max="50" step="0.1" oninput="updateProp('w')">
    <label>高度 (%)</label><input type="range" id="prop-h" min="1" max="50" step="0.1" oninput="updateProp('h')">
    <label>透明度</label><input type="range" id="prop-opacity" min="0" max="1" step="0.01" oninput="updateProp('opacity')">
    <label>填充颜色</label><input type="color" id="prop-fill" onchange="updateProp('fill')">
    <label>边框颜色</label><input type="color" id="prop-stroke" onchange="updateProp('stroke')">
    <label>边框宽度 (px)</label><input type="range" id="prop-strokeW" min="0" max="10" step="0.5" oninput="updateProp('strokeW')">
    <label>文字颜色</label><input type="color" id="prop-color" onchange="updateProp('color')">
    <label>文字大小 (rem)</label><input type="range" id="prop-fontSize" min="0.3" max="3" step="0.05" oninput="updateProp('fontSize')">
    <label>跳转链接</label><input type="text" id="prop-href" placeholder="如 #tarot" onchange="updateProp('href')">
  </div>
</div>

<div class="canvas-wrap" id="canvas-wrap">
  <div class="canvas-inner" id="canvas-inner">
    <img src="assets/bg-cabin.jpg" alt="背景" id="bg-img" style="position:absolute;inset:0;width:100%;height:100%;object-fit:fill;image-rendering:pixelated;">
  </div>
</div>

<div class="status">
  <span id="hover-coord">悬停: -</span>
  <span id="active-info">选中: 无</span>
  <span>🖱 拖拽移动 | 🔲 拖拽角落调整大小 | 单击选中</span>
</div>

<script>
const canvas = document.getElementById('canvas-inner');
const img = document.getElementById('bg-img');
const panel = document.getElementById('panel');
const propsDiv = document.getElementById('props');

let buttons = [];
let activeBtn = null;
let dragging = null;

// 从百分比转换为像素（相对于图片显示区域）
function pctToPx(pctX, pctY) {
  const rect = canvas.getBoundingClientRect();
  return { x: rect.left + rect.width * pctX / 100, y: rect.top + rect.height * pctY / 100 };
}
function pxToPct(pxX, pxY) {
  const rect = canvas.getBoundingClientRect();
  return { x: ((pxX - rect.left) / rect.width) * 100, y: ((pxY - rect.top) / rect.height) * 100 };
}

// 创建按钮元素
function createBtnEl(data) {
  const el = document.createElement('div');
  el.className = 'edit-btn';
  el.innerHTML = '<div class="resize-handle rh-se"></div><div class="resize-handle rh-nw"></div><div class="resize-handle rh-ne"></div><div class="resize-handle rh-sw"></div>';
  el.id = 'btn-' + data.id;
  canvas.appendChild(el);
  applyBtnStyle(el, data);
  bindBtnEvents(el, data);
  return el;
}

function applyBtnStyle(el, d) {
  el.style.left = d.x + '%';
  el.style.top = d.y + '%';
  el.style.width = d.w + '%';
  el.style.height = d.h + '%';
  el.style.opacity = d.opacity;
  el.style.background = d.fill;
  el.style.border = d.strokeW + 'px solid ' + d.stroke;
  el.style.color = d.color;
  el.style.fontSize = d.fontSize + 'rem';
  el.textContent = d.name || '';
  if (d.shape === 'circle') el.style.borderRadius = '50%';
  else if (d.shape === 'rounded') el.style.borderRadius = '12px';
  else if (d.shape === 'oval') el.style.borderRadius = '50%';
  else el.style.borderRadius = '2px';
}

function bindBtnEvents(el, data) {
  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('resize-handle')) return;
    e.preventDefault();
    selectBtn(data);
    dragging = { type: 'move', data, startX: e.clientX, startY: e.clientY, startLeft: data.x, startTop: data.y };
  });
  el.addEventListener('touchstart', e => {
    if (e.target.classList.contains('resize-handle')) return;
    e.preventDefault();
    selectBtn(data);
    dragging = { type: 'move', data, startX: e.touches[0].clientX, startY: e.touches[0].clientY, startLeft: data.x, startTop: data.y };
  });
}

function selectBtn(data) {
  activeBtn = data;
  document.querySelectorAll('.edit-btn').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('btn-' + data.id);
  if (el) el.classList.add('active');
  document.getElementById('active-info').textContent = '选中: ' + (data.name || '(无名)');
  propsDiv.style.display = 'block';
  document.getElementById('prop-name').value = data.name || '';
  document.getElementById('prop-shape').value = data.shape;
  document.getElementById('prop-x').value = data.x;
  document.getElementById('prop-y').value = data.y;
  document.getElementById('prop-w').value = data.w;
  document.getElementById('prop-h').value = data.h;
  document.getElementById('prop-opacity').value = data.opacity;
  document.getElementById('prop-fill').value = data.fill;
  document.getElementById('prop-stroke').value = data.stroke;
  document.getElementById('prop-strokeW').value = data.strokeW;
  document.getElementById('prop-color').value = data.color;
  document.getElementById('prop-fontSize').value = data.fontSize;
  document.getElementById('prop-href').value = data.href || '';
}

// 全局鼠标事件
document.addEventListener('mousemove', e => {
  const pct = pxToPct(e.clientX, e.clientY);
  document.getElementById('hover-coord').textContent = `悬停: ${pct.x.toFixed(1)}%, ${pct.y.toFixed(1)}%`;

  if (!dragging) return;
  const dx = ((e.clientX - dragging.startX) / canvas.getBoundingClientRect().width) * 100;
  const dy = ((e.clientY - dragging.startY) / canvas.getBoundingClientRect().height) * 100;

  if (dragging.type === 'move') {
    dragging.data.x = Math.max(0, Math.min(100, dragging.startLeft + dx));
    dragging.data.y = Math.max(0, Math.min(100, dragging.startTop + dy));
  }
  applyBtnStyle(document.getElementById('btn-' + dragging.data.id), dragging.data);
  if (activeBtn === dragging.data) {
    document.getElementById('prop-x').value = dragging.data.x;
    document.getElementById('prop-y').value = dragging.data.y;
  }
});

document.addEventListener('mouseup', () => { dragging = null; });

// 触摸事件
document.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dx = ((e.touches[0].clientX - dragging.startX) / canvas.getBoundingClientRect().width) * 100;
  const dy = ((e.touches[0].clientY - dragging.startY) / canvas.getBoundingClientRect().height) * 100;
  if (dragging.type === 'move') {
    dragging.data.x = Math.max(0, Math.min(100, dragging.startLeft + dx));
    dragging.data.y = Math.max(0, Math.min(100, dragging.startTop + dy));
  }
  applyBtnStyle(document.getElementById('btn-' + dragging.data.id), dragging.data);
}, {passive: false});
document.addEventListener('touchend', () => { dragging = null; });

// Resize handles
canvas.addEventListener('mousedown', e => {
  if (!e.target.classList.contains('resize-handle')) return;
  e.preventDefault(); e.stopPropagation();
  const btnEl = e.target.closest('.edit-btn');
  const id = parseInt(btnEl.id.replace('btn-', ''));
  const data = buttons.find(b => b.id === id);
  if (!data) return;
  selectBtn(data);
  const dir = e.target.classList.contains('rh-se') ? 'se' : e.target.classList.contains('rh-ne') ? 'ne' : e.target.classList.contains('rh-sw') ? 'sw' : 'nw';
  dragging = { type: 'resize', data, dir, startX: e.clientX, startY: e.clientY, startW: data.w, startH: data.h, startLeft: data.x, startTop: data.y };
});

// 鼠标移动时处理 resize
const origMouseMove = document.onmousemove;
document.addEventListener('mousemove', function resizeHandler(e) {
  if (!dragging || dragging.type !== 'resize') return;
  const rect = canvas.getBoundingClientRect();
  const dx = ((e.clientX - dragging.startX) / rect.width) * 100;
  const dy = ((e.clientY - dragging.startY) / rect.height) * 100;
  const d = dragging.data;
  if (dragging.dir.includes('e')) d.w = Math.max(1, dragging.startW + dx);
  if (dragging.dir.includes('w')) { d.w = Math.max(1, dragging.startW - dx); d.x = dragging.startLeft + dx; }
  if (dragging.dir.includes('s')) d.h = Math.max(1, dragging.startH + dy);
  if (dragging.dir.includes('n')) { d.h = Math.max(1, dragging.startH - dy); d.y = dragging.startTop + dy; }
  applyBtnStyle(document.getElementById('btn-' + d.id), d);
  if (activeBtn === d) {
    document.getElementById('prop-w').value = d.w;
    document.getElementById('prop-h').value = d.h;
  }
});

// 属性面板变更
window.updateProp = function(key) {
  if (!activeBtn) return;
  const el = document.getElementById('prop-' + key);
  let val = el.value;
  if (key === 'opacity' || key === 'fontSize' || key === 'x' || key === 'y' || key === 'w' || key === 'h') val = parseFloat(val);
  if (key === 'strokeW') val = parseFloat(val);
  activeBtn[key] = val;
  applyBtnStyle(document.getElementById('btn-' + activeBtn.id), activeBtn);
};

window.addBtn = function() {
  const id = Date.now();
  const data = { id, name: '新按钮', shape: 'rounded', x: 42, y: 50, w: 10, h: 7, opacity: 0.15, fill: '#ffd700', stroke: '#ffd700', strokeW: 1, color: '#ffd700', fontSize: 0.6, href: '' };
  buttons.push(data);
  createBtnEl(data);
  selectBtn(data);
  document.getElementById('btn-count').textContent = '按钮数量: ' + buttons.length;
};

window.delBtn = function() {
  if (!activeBtn) return;
  const el = document.getElementById('btn-' + activeBtn.id);
  if (el) el.remove();
  buttons = buttons.filter(b => b.id !== activeBtn.id);
  activeBtn = null;
  propsDiv.style.display = 'none';
  document.getElementById('active-info').textContent = '选中: 无';
  document.getElementById('btn-count').textContent = '按钮数量: ' + buttons.length;
};

window.save = function() {
  const data = buttons.map(b => ({
    id: b.id, name: b.name, shape: b.shape, x: b.x, y: b.y, w: b.w, h: b.h,
    opacity: b.opacity, fill: b.fill, stroke: b.stroke, strokeW: b.strokeW,
    color: b.color, fontSize: b.fontSize, href: b.href
  }));
  localStorage.setItem('divination_btns', JSON.stringify(data));
  const json = JSON.stringify(data, null, 2);
  navigator.clipboard.writeText(json).then(() => alert('已保存！JSON 已复制到剪贴板'));
  console.log(json);
};

window.load = function() {
  const raw = localStorage.getItem('divination_btns');
  if (!raw) return;
  buttons.forEach(b => { const el = document.getElementById('btn-' + b.id); if (el) el.remove(); });
  buttons = [];
  JSON.parse(raw).forEach(d => { buttons.push(d); createBtnEl(d); });
  activeBtn = null; propsDiv.style.display = 'none';
  document.getElementById('btn-count').textContent = '按钮数量: ' + buttons.length;
};

// 点击空白取消选中
document.getElementById('canvas-wrap').addEventListener('click', e => {
  if (e.target === e.currentTarget) {
    activeBtn = null;
    document.querySelectorAll('.edit-btn').forEach(el => el.classList.remove('active'));
    propsDiv.style.display = 'none';
    document.getElementById('active-info').textContent = '选中: 无';
  }
});

// 键盘删除
document.addEventListener('keydown', e => { if ((e.key === 'Delete' || e.key === 'Backspace') && activeBtn && document.activeElement === document.body) delBtn(); });

// 初始化
load();
if (buttons.length === 0) {
  // 默认两个按钮
  buttons.push({ id: 1, name: '塔罗', shape: 'circle', x: 12, y: 54, w: 8, h: 8, opacity: 0.12, fill: '#ffd700', stroke: '#ffd700', strokeW: 1, color: '#e0c878', fontSize: 0.5, href: '#tarot' });
  buttons.push({ id: 2, name: '周易', shape: 'circle', x: 62, y: 22, w: 6, h: 6, opacity: 0.12, fill: '#ffd700', stroke: '#ffd700', strokeW: 1, color: '#e0c878', fontSize: 0.5, href: '#zhouyi' });
}
buttons.forEach(b => createBtnEl(b));
document.getElementById('btn-count').textContent = '按钮数量: ' + buttons.length;
</script>
</body>
</html>
